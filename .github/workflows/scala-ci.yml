name: Scala/C++ CI

on:
  push:
  pull_request:

  workflow_dispatch:

jobs:

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: cache SBT deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.sbt
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt') }}

      - name: build
        run: sbt compile

      - name: run tests
        run: sbt test
